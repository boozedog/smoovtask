name: readonly-tools
description: Read-only tools that are always safe to allow
priority: 40
event: PreToolUse

rules:
  - name: allow-read
    match:
      tool: Read
    action: allow
    message: "read-only file access allowed"

  - name: allow-glob
    match:
      tool: Glob
    action: allow
    message: "file search allowed"

  - name: allow-grep
    match:
      tool: Grep
    action: allow
    message: "content search allowed"

  - name: allow-toolsearch
    match:
      tool: ToolSearch
    action: allow
    message: "tool discovery allowed"

  - name: allow-agent
    match:
      tool: Agent
    action: allow
    message: "agent delegation allowed"

  - name: allow-askuserquestion
    match:
      tool: AskUserQuestion
    action: allow
    message: "asking user questions allowed"

  - name: allow-enterplanmode
    match:
      tool: EnterPlanMode
    action: allow
    message: "plan mode allowed"

  - name: allow-exitplanmode
    match:
      tool: ExitPlanMode
    action: allow
    message: "exit plan mode allowed"

  - name: allow-websearch
    match:
      tool: WebSearch
    action: allow
    message: "web search allowed"

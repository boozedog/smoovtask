version: 2

builds:
  - main: ./cmd/st
    binary: st
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/boozedog/smoovtask/internal/version.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
